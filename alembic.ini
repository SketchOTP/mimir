[alembic]
script_location = migrations

# Default URL — overridden in migrations/env.py via mimir.config.get_settings()
# Set MIMIR_DATA_DIR to point to the correct database location.
sqlalchemy.url = sqlite+aiosqlite:///./data/mimir.db

# Max file size for migration files (0 = unlimited)
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
