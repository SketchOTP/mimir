server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy — forward backend routes to FastAPI ─────────────────────────
    # Allows the web UI (port 5173 / 80) to reach the API without CORS issues.
    location /api/ {
        proxy_pass http://api:8787/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /mcp {
        proxy_pass http://api:8787/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://api:8787/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /.well-known/ {
        proxy_pass http://api:8787/.well-known/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /oauth/ {
        proxy_pass http://api:8787/oauth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /setup {
        proxy_pass http://api:8787/setup;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /settings/connection {
        proxy_pass http://api:8787/settings/connection;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://api:8787/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback — all other paths render index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
