name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  # ── SQLite unit tests ────────────────────────────────────────────────────────
  tests-sqlite:
    name: Unit tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests (SQLite)
        run: pytest tests/ -v --tb=short
        env:
          MIMIR_DATA_DIR: /tmp/mimir_test
          MIMIR_VECTOR_DIR: /tmp/mimir_test/vectors
          MIMIR_ENV: development

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-sqlite
          path: .pytest_cache/

  # ── Postgres unit tests ──────────────────────────────────────────────────────
  tests-postgres:
    name: Unit tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mimir
          POSTGRES_PASSWORD: mimir
          POSTGRES_DB: mimir_test
        options: >-
          --health-cmd "pg_isready -U mimir -d mimir_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations on Postgres
        run: alembic upgrade head
        env:
          MIMIR_DATABASE_URL: postgresql+asyncpg://mimir:mimir@localhost:5432/mimir_test
          MIMIR_DATA_DIR: /tmp/mimir_test_pg
          MIMIR_VECTOR_DIR: /tmp/mimir_test_pg/vectors

      - name: Run unit tests (Postgres)
        run: |
          pytest tests/ -v --tb=short \
            -k "not test_fresh_db_migration and not test_alembic_version and not test_upgrade_head_idempotent and not test_existing_db"
        env:
          MIMIR_DATABASE_URL: postgresql+asyncpg://mimir:mimir@localhost:5432/mimir_test
          MIMIR_DATA_DIR: /tmp/mimir_test_pg
          MIMIR_VECTOR_DIR: /tmp/mimir_test_pg/vectors
          MIMIR_ENV: development

      - name: Upload test results (Postgres)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-postgres
          path: .pytest_cache/

  # ── Eval harness ─────────────────────────────────────────────────────────────
  evals:
    name: Eval harness
    runs-on: ubuntu-latest
    needs: tests-sqlite
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run eval harness (all suites)
        run: python -m evals.runner --suite all --out reports/evals/latest.json
        env:
          MIMIR_DATA_DIR: /tmp/mimir_eval
          MIMIR_VECTOR_DIR: /tmp/mimir_eval/vectors
          MIMIR_ENV: development

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            reports/evals/latest.json
            reports/evals/latest.md

  # ── Release gate ─────────────────────────────────────────────────────────────
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    needs: evals
    steps:
      - uses: actions/checkout@v4

      - name: Download eval report
        uses: actions/download-artifact@v4
        with:
          name: eval-report
          path: reports/evals/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check release gate
        run: python -m evals.release_gate --report reports/evals/latest.json
        env:
          MIMIR_DATA_DIR: /tmp/mimir_gate
          MIMIR_VECTOR_DIR: /tmp/mimir_gate/vectors
          MIMIR_ENV: development

  # ── Docker smoke test (optional, requires Docker daemon) ─────────────────────
  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: tests-sqlite
    # Only run on push to main, or when explicitly triggered
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker daemon availability
        id: docker-check
        run: |
          if docker info > /dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Docker daemon not available — skipping smoke test"
          fi

      - name: Run Docker smoke test (SQLite)
        if: steps.docker-check.outputs.available == 'true'
        run: bash scripts/docker_smoke_test.sh
        env:
          MIMIR_API_KEY: local-dev-key

      - name: Skip notice
        if: steps.docker-check.outputs.available != 'true'
        run: |
          echo "::notice::Docker smoke test skipped — no daemon. Run locally: bash scripts/docker_smoke_test.sh"
